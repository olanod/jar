name: "CI: Grey"

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        # Ignored advisories:
        #   RUSTSEC-2025-0009: ring 0.16.x AES panic — transitive dep via
        #     libp2p-tls -> rcgen -> ring. No upgrade path until libp2p
        #     updates to ring 0.17+.
        #   RUSTSEC-2025-0010: ring 0.16.x unmaintained — same root cause.
        run: >
          cargo audit
          --ignore RUSTSEC-2025-0009
          --ignore RUSTSEC-2025-0010

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings
        env:
          SKIP_GUEST_BUILD: 1

      - name: cargo doc
        run: cargo doc --locked --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
          SKIP_GUEST_BUILD: 1

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Workspace tests (interpreter)
        run: cargo test --locked --workspace --release
        env:
          RUSTFLAGS: "-D warnings"

      - name: Workspace tests (recompiler)
        run: cargo test --locked --workspace --release
        env:
          GREY_PVM: recompiler
          RUSTFLAGS: "-D warnings"

      - name: Workspace tests (interpreter)
        run: cargo test --locked --workspace --release
        env:
          GREY_PVM: interpreter
          RUSTFLAGS: "-D warnings"

  harness:
    name: Integration harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Run harness
        run: cargo run --locked --release -p harness -- --seq-testnet
