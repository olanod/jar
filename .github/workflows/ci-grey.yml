name: "CI: Grey"

on:
  push:
    branches: [master]
    paths: ['grey/**', 'spec/tests/vectors/**']
  pull_request:
    paths: ['grey/**', 'spec/tests/vectors/**']

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: grey

      - name: Build bench-ecrecover ELF (grey/javm target)
        working-directory: grey/services/bench-ecrecover
        run: |
          cargo +nightly build --release --bin bench-ecrecover \
            --target ../riscv64em-javm.json \
            -Zbuild-std=core,alloc -Zjson-target-spec

      - name: Build sample-service ELF
        working-directory: grey/services/sample-service
        run: |
          cargo +nightly build --release \
            --target ../riscv64em-javm.json \
            -Zbuild-std=core -Zjson-target-spec

      - name: Build bench-ecrecover ELF (polkavm target)
        working-directory: grey/services/bench-ecrecover
        run: |
          RUSTFLAGS="-Zunstable-options -Cpanic=immediate-abort" \
          RUSTC_BOOTSTRAP=1 CARGO_PROFILE_RELEASE_STRIP=false \
          cargo +nightly build --release --lib \
            --target ../riscv64emac-polkavm.json \
            -Zbuild-std=core,alloc -Zjson-target-spec

      - name: Workspace tests (interpreter)
        working-directory: grey
        run: cargo +stable test --workspace

      - name: Workspace tests (recompiler)
        working-directory: grey
        run: cargo +stable test --workspace
        env:
          GREY_PVM: recompiler
