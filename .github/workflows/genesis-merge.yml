name: "Genesis: Merge"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to merge"
        required: true
        type: number
      founder_override:
        description: "Founder override (skip quorum check)"
        required: false
        type: boolean
        default: false

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - name: Get base branch
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ inputs.pr_number }}
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          BASE=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json baseRefName --jq '.baseRefName')
          echo "base=$BASE" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.base }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for protected file changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_AUTHOR=$(gh pr view ${{ steps.pr-info.outputs.pr_number }} --json author --jq '.author.login')
          CHANGED=$(gh api repos/${{ github.repository }}/pulls/${{ steps.pr-info.outputs.pr_number }}/files --paginate --jq '.[].filename')
          if echo "$CHANGED" | grep -qE '^\.github/workflows/genesis-'; then
            if [ "$PR_AUTHOR" != "sorpaas" ]; then
              gh pr comment ${{ steps.pr-info.outputs.pr_number }} --body \
                "**JAR Bot:** Cannot merge — this PR modifies protected genesis files. Only the founder (sorpaas) may modify these."
              exit 1
            fi
          fi

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: spec/.lake
          key: lake-genesis-${{ hashFiles('spec/lean-toolchain', 'spec/lake-manifest.json', 'spec/lakefile.lean') }}
          restore-keys: lake-genesis-

      - name: Build tools
        run: |
          cd spec && lake build genesis
          cargo build -p jar-genesis

      - name: Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--pr ${{ steps.pr-info.outputs.pr_number }}"
          if [ "${{ inputs.founder_override }}" = "true" ]; then
            ARGS="$ARGS --founder-override"
          fi
          cargo run -p jar-genesis -- workflow merge $ARGS

      - name: Trigger docs deployment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run docs.yml --ref master
