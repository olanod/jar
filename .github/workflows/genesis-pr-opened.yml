name: "Genesis: PR Opened"

on:
  pull_request_target:
    types: [opened]
    branches: [master]

jobs:
  select-targets:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest master
        run: git pull origin master --ff-only

      - name: Check for protected file changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          AUTHOR="$PR_AUTHOR"
          CHANGED=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')
          if echo "$CHANGED" | grep -qE '^\.github/workflows/genesis-'; then
            if [ "$AUTHOR" != "sorpaas" ]; then
              gh pr comment ${{ github.event.pull_request.number }} --body \
                "**JAR Bot:** This PR modifies protected genesis files (workflows or cache). Only the founder (sorpaas) may modify these. Genesis scoring is disabled for this PR."
              exit 1
            fi
          fi

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: spec/.lake
          key: lake-genesis-${{ hashFiles('spec/lean-toolchain', 'spec/lake-manifest.json', 'spec/lakefile.lean') }}
          restore-keys: lake-genesis-

      - name: Build tools
        run: |
          cd spec && lake build genesis
          cargo build -p jar-genesis

      - name: Select targets and post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo run -p jar-genesis -- workflow pr-opened \
            --pr ${{ github.event.pull_request.number }} \
            --created-at "${{ github.event.pull_request.created_at }}"
