name: "Genesis: Review Check"

on:
  issue_comment:
    types: [created]

concurrency:
  group: genesis-review-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  check-review:
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/review')
    runs-on: ubuntu-latest
    environment: genesis
    permissions:
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest master
        run: git pull origin master --ff-only

      - name: Check for protected file changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_AUTHOR=$(gh pr view "$PR_NUMBER" --json author --jq '.author.login')
          CHANGED=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename')
          if echo "$CHANGED" | grep -qE '^\.github/workflows/genesis-'; then
            if [ "$PR_AUTHOR" != "sorpaas" ]; then
              echo "Protected files modified by non-founder — skipping genesis review"
              exit 0
            fi
          fi

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: spec/.lake
          key: lake-genesis-${{ hashFiles('spec/lean-toolchain', 'spec/lake-manifest.json', 'spec/lakefile.lean') }}
          restore-keys: lake-genesis-

      - name: Build tools
        run: |
          cd spec && lake build genesis
          cargo build -p jar-genesis

      - name: Process review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: |
          cargo run -p jar-genesis -- workflow review \
            --pr "$PR_NUMBER" \
            --comment-author "$COMMENT_AUTHOR" \
            --comment-body "$COMMENT_BODY"
