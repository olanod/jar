name: Documentation

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # -- Zensical (main site) --
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install zensical
      - run: zensical build --clean

      # -- JarBook (spec subfolder) --
      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Lake packages
        uses: actions/cache@v4
        with:
          path: spec/.lake
          key: lake-docs-${{ hashFiles('spec/lean-toolchain', 'spec/lake-manifest.json', 'spec/lakefile.lean') }}
          restore-keys: lake-docs-

      - name: Cache crypto-ffi build
        uses: actions/cache@v4
        with:
          path: spec/crypto-ffi/target
          key: crypto-ffi-docs-${{ hashFiles('spec/crypto-ffi/Cargo.toml', 'spec/crypto-ffi/Cargo.lock', 'spec/crypto-ffi/src/**') }}
          restore-keys: crypto-ffi-docs-

      - name: Build crypto-ffi
        working-directory: spec/crypto-ffi
        run: cargo build --release

      - name: Build JarBook
        working-directory: spec
        run: make book

      # -- Combine --
      - name: Copy JarBook into site
        run: cp -r spec/_out/html-multi site/spec

      - uses: actions/upload-pages-artifact@v4
        if: github.ref == 'refs/heads/master'
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/deploy-pages@v4
        id: deployment
