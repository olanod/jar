[project]
site_name = "JAR"
site_url = "https://jarchain.org/"
site_description = "JAR Chain: Join-Accumulate Refine blockchain based on JAM."
site_author = "JAR Contributors"
copyright = "Copyright &copy; 2025-2026 JAR Contributors"
repo_name = "jarchain/jar"
repo_url = "https://github.com/jarchain/jar"
edit_uri = "https://github.com/jarchain/jar/edit/master/docs/"

[project.theme]
language = "en"
custom_dir = "docs/overrides"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.top",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.nav]]
Documentation = [
    { Introduction = "introduction.md" },
    { Genesis = "genesis.md" },
    { Coinless = "coinless.md" },
]

[[project.nav]]
Specification = "/spec/"

[[project.nav]]
GitHub = "https://github.com/jarchain/jar"

[[project.nav]]
Matrix = "https://matrix.to/#/#jar:matrix.org"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/jarchain/jar"
