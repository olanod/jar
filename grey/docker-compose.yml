# Grey — 6-validator local testnet via Docker Compose.
#
# Start:  docker compose -f grey/docker-compose.yml up --build
# Stop:   docker compose -f grey/docker-compose.yml down -v
# Logs:   docker compose -f grey/docker-compose.yml logs -f validator-0
# RPC:    curl http://localhost:9933/health
#
# Validator 0 exposes RPC on port 9933. All validators use --tiny config
# and auto-discover peers via boot peer addresses.

x-grey-common: &grey-common
  build:
    context: ..
    dockerfile: grey/Dockerfile
  restart: unless-stopped
  networks:
    - testnet

services:
  validator-0:
    <<: *grey-common
    container_name: grey-v0
    command:
      - "--listen-addr=0.0.0.0"
      - "--port=9000"
      - "-i=0"
      - "--tiny"
      - "--db-path=/data"
      - "--rpc-port=9933"
      - "--rpc-host=0.0.0.0"
      - "--rpc-cors"
    ports:
      - "9000:9000"   # P2P
      - "9933:9933"   # RPC
    volumes:
      - v0-data:/data
    networks:
      testnet:
        ipv4_address: 172.28.0.10

  validator-1:
    <<: *grey-common
    container_name: grey-v1
    command:
      - "--listen-addr=0.0.0.0"
      - "--port=9000"
      - "-i=1"
      - "--tiny"
      - "--db-path=/data"
      - "--rpc-port=0"
      - "-b=/ip4/172.28.0.10/tcp/9000"
    depends_on:
      - validator-0
    volumes:
      - v1-data:/data

  validator-2:
    <<: *grey-common
    container_name: grey-v2
    command:
      - "--listen-addr=0.0.0.0"
      - "--port=9000"
      - "-i=2"
      - "--tiny"
      - "--db-path=/data"
      - "--rpc-port=0"
      - "-b=/ip4/172.28.0.10/tcp/9000"
    depends_on:
      - validator-0
    volumes:
      - v2-data:/data

  validator-3:
    <<: *grey-common
    container_name: grey-v3
    command:
      - "--listen-addr=0.0.0.0"
      - "--port=9000"
      - "-i=3"
      - "--tiny"
      - "--db-path=/data"
      - "--rpc-port=0"
      - "-b=/ip4/172.28.0.10/tcp/9000"
    depends_on:
      - validator-0
    volumes:
      - v3-data:/data

  validator-4:
    <<: *grey-common
    container_name: grey-v4
    command:
      - "--listen-addr=0.0.0.0"
      - "--port=9000"
      - "-i=4"
      - "--tiny"
      - "--db-path=/data"
      - "--rpc-port=0"
      - "-b=/ip4/172.28.0.10/tcp/9000"
    depends_on:
      - validator-0
    volumes:
      - v4-data:/data

  validator-5:
    <<: *grey-common
    container_name: grey-v5
    command:
      - "--listen-addr=0.0.0.0"
      - "--port=9000"
      - "-i=5"
      - "--tiny"
      - "--db-path=/data"
      - "--rpc-port=0"
      - "-b=/ip4/172.28.0.10/tcp/9000"
    depends_on:
      - validator-0
    volumes:
      - v5-data:/data

volumes:
  v0-data:
  v1-data:
  v2-data:
  v3-data:
  v4-data:
  v5-data:

networks:
  testnet:
    ipam:
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1
    driver: bridge
